name: Production CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///test.db
          SECRET_KEY: test-secret-key-for-ci

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy group-travel-os-api \
            --source . \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest" \
            --set-env-vars="ENVIRONMENT=production,DEBUG=False,ALLOWED_ORIGINS=[\"https://group-travel-os.vercel.app\",\"http://localhost:3000\"]"
