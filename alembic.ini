[alembic]
# Path to migration scripts
script_location = alembic

# Database URL is not stored in this file for production.
# alembic/env.py sets sqlalchemy.url from env DATABASE_URL or settings.DATABASE_URL (see get_url()).

# Template for migration filenames
# %%(rev)s = short revision id, %%(slug)s = description slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s


# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
